<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Firebase_version9_RealtimeDB(G'sACADEMY初学者用サンプル)</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <main class="app">
      <header class="app-header">
        <h1>場所日記</h1>
        <p>訪れた場所を、一言と星評価で残す日記アプリ</p>
      </header>

      <section class="form-card">
        <div class="field">
          <label for="placename">場所名</label>
          <input id="placename" type="text" placeholder="例：代々木公園" />
        </div>

        <div class="field">
          <label for="text">一言感想</label>
          <textarea id="text" placeholder="例：緑が多くて散歩しやすかった"></textarea>
        </div>

        <div class="stars" id="ratingStars">
          <span class="stars-label">オススメ度</span>
          <button type="button" data-value="1">☆</button>
          <button type="button" data-value="2">☆</button>
          <button type="button" data-value="3">☆</button>
          <button type="button" data-value="4">☆</button>
          <button type="button" data-value="5">☆</button>
          <span id="ratingValue">0</span>
        </div>

        <div id="send">
          <button>記録する</button>
        </div>
      </section>

      <section class="timeline">
        <h2>投稿一覧</h2>
        <div id="output"></div>
      </section>
    </main>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script type="module" src="js/index.js"></script>
  </body>
</html>
